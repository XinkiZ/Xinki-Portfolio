server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/xinki_portfolio?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: your_password
    driver-class-name: com.mysql.cj.jdbc.Driver

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto

openai:
  api-key: your_openai_api_key
  model: gpt-3.5-turbo

jwt:
  secret: xinki-portfolio-jwt-secret-key-2026
  expiration: 86400000
