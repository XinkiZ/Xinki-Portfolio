server:
  port: 8080

spring:
  ai:
    dashscope:
      api-key: ${BAILIAN_API_KEY}
      chat:
        options:
          model: qwen-plus
          temperature: 0.3
          max-tokens: 4096
      embedding:
        options:
          model: text-embedding-v3
  datasource:
    url: jdbc:mysql://mysql:3306/xinki_portfolio?allowPublicKeyRetrieval=true&useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf-8
    username: root
    password: ${MYSQL_ROOT_PASSWORD:Xinki@2026}
    driver-class-name: com.mysql.cj.jdbc.Driver
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  redis:
    host: redis
    port: 6379
    password: ${REDIS_PASSWORD:}
    lettuce:
      pool:
        max-active: 8
        max-idle: 8
        min-idle: 0
    timeout: 3000ms

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto



jwt:
  secret: ${JWT_SECRET:xinki-portfolio-jwt-secret-key-2026}
  expiration: 86400000

aliyun:
  oss:
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    bucket-name: ${OSS_BUCKET_NAME:sky-17371}

rag:
  top-k: 3
  max-chunks-per-file: 50
  min-chunk-length: 50
  max-chunk-length: 800
  max-context-chars: 2000